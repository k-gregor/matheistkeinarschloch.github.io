<script>
document.addEventListener("DOMContentLoaded", function() {
  const graph = document.getElementById('mygraph');

  document.querySelectorAll(".dropdown > .dropbtn").forEach(function(button) {
    button.addEventListener("click", function(e) {
      e.preventDefault();
      const li = button.parentElement;
      const wasOpen = li.classList.contains("open");
      
      // Close all dropdowns
      document.querySelectorAll(".dropdown").forEach(function(other){
        other.classList.remove("open");
      });

      // Re-open current if it wasn’t open
      if (!wasOpen) {
        li.classList.add("open");
        // temporarily disable pointer events on graph
        graph.style.pointerEvents = "none";
      } else {
        graph.style.pointerEvents = "auto";
      }
    });
  });

  // Close dropdowns if click outside
  document.addEventListener("click", function(e) {
    if (!e.target.closest(".dropdown")) {
      document.querySelectorAll(".dropdown").forEach(function(li){
        li.classList.remove("open");
      });
      // restore graph pointer events
      graph.style.pointerEvents = "auto";
    }
  });
});

document.querySelectorAll(".dropbtn").forEach(btn => {
  btn.addEventListener("click", e => {
    const overlay = document.getElementById("dropdown-overlay");
    overlay.style.display = "block"; // block touches to graph
  });
});



document.getElementById("dropdown-overlay").addEventListener("click", e => {
  e.target.style.display = "none"; // remove overlay when clicked outside
});

</script>
